name: Stage npm release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact workspace version to stage
        required: true
        type: string
      dist_tag:
        description: npm distribution tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

permissions:
  contents: read

concurrency:
  group: mensor-npm-release
  cancel-in-progress: false

jobs:
  stage:
    name: Validate and stage npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install staged-publishing npm CLI
        run: npm install --global npm@11.18.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate release input and repository
        run: pnpm run release-check -- --version "${{ inputs.version }}" --tag "${{ inputs.dist_tag }}"
      - name: Run aggregate gate
        run: pnpm run check
      - name: Pack release artifacts
        run: pnpm run release:pack -- --version "${{ inputs.version }}"
      - name: Stage contract package
        run: npm stage publish "./dist/release/0disoft-mensor-contract-${{ inputs.version }}.tgz" --tag "${{ inputs.dist_tag }}"
      - name: Stage compiler package
        run: npm stage publish "./dist/release/0disoft-mensor-compiler-${{ inputs.version }}.tgz" --tag "${{ inputs.dist_tag }}"
      - name: Stage CLI package
        run: npm stage publish "./dist/release/0disoft-mensor-cli-${{ inputs.version }}.tgz" --tag "${{ inputs.dist_tag }}"
